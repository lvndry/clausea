name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "packages/backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/backend/**"
      - ".github/workflows/backend.yml"

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            packages/backend/.venv
            packages/backend/.uv/cache
          key: ${{ runner.os }}-uv-${{ hashFiles('packages/backend/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --dev

      - name: Run linting with ruff
        run: uv run ruff check .

      - name: Run type checking
        run: uv run ty check

      - name: Run security checks with bandit
        run: uv run bandit -r src/ -f json -o bandit-report.json || true

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: "latest"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            packages/backend/.venv
            packages/backend/.uv/cache
          key: ${{ runner.os }}-uv-3.12-${{ hashFiles('packages/backend/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-3.12-

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            packages/backend/.pytest_cache/
          retention-days: 7
